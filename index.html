<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MycoMarket – Admin Panel</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f0e8;
            margin: 0;
            padding: 12px;
        }
        /* Login */
        .login-box {
            max-width: 350px;
            margin: 40px auto;
            background: white;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-box h2 {
            color: #3b2a1a;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #ddd;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .login-box button {
            background: #8b6914;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .error {
            color: #c4622d;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Admin panel */
        .admin-panel {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #3b2a1a;
        }
        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .refresh-btn, .logout-btn {
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        .refresh-btn {
            background: #6b7c5c;
            color: white;
        }
        .logout-btn {
            background: #f0ebe0;
            color: #3b2a1a;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tab {
            background: #e9e2d4;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active {
            background: #8b6914;
            color: white;
        }

        /* Orders table */
        .table-container {
            background: white;
            border-radius: 24px;
            padding: 15px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f9f5ee;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #d4dbc8;
        }
        .status-badge.pending {
            background: #ffecb3;
            color: #7d5d0e;
        }

        /* Product form */
        .product-form {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }
        .form-group input, .form-group textarea, .form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .form-group textarea {
            resize: vertical;
        }
        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group label {
            margin-bottom: 0;
        }
        button {
            background: #8b6914;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .product-list {
            background: white;
            border-radius: 24px;
            padding: 20px;
            overflow-x: auto;
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding: 12px 0;
        }
        .product-actions button {
            margin-left: 10px;
            background: #6b7c5c;
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        .product-actions button.delete {
            background: #c4622d;
        }
        .img-preview {
            max-width: 80px;
            max-height: 80px;
            border-radius: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b6914;
        }
        @media (min-width: 600px) {
            body { padding: 20px; }
            .header { padding: 15px 25px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginDiv" class="login-box">
    <h2>🍄 MycoMarket Admin</h2>
    <input type="password" id="passwordInput" placeholder="Enter password" autofocus>
    <button onclick="checkPassword()">Login</button>
    <div id="loginError" class="error"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin-panel">
    <div class="header">
        <h1>🍄 Admin Dashboard</h1>
        <div class="header-right">
            <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="orders">📦 Orders</div>
        <div class="tab" data-tab="products">🍄 Products</div>
    </div>

    <!-- ORDERS SECTION -->
    <div id="ordersSection" class="tab-content">
        <div class="table-container">
            <div id="ordersTable"><div class="loading">Loading orders...</div></div>
        </div>
    </div>

    <!-- PRODUCTS SECTION -->
    <div id="productsSection" class="tab-content" style="display: none;">
        <div class="product-form">
            <h3>➕ Add / Edit Product</h3>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="prodName" required>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" id="prodPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Unit (e.g., 250g)</label>
                        <input type="text" id="prodUnit" value="250g">
                    </div>
                    <div class="form-group">
                        <label>Tag / Badge</label>
                        <input type="text" id="prodTag" placeholder="Gourmet, Medicinal...">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="prodCategory" placeholder="Fresh, Dried, Powder...">
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="prodFeatured">
                        <label>Featured on Homepage</label>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="prodDesc" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image (URL or upload)</label>
                        <input type="text" id="prodImageUrl" placeholder="https://...">
                        <div style="margin-top: 8px;">
                            <input type="file" id="prodImageFile" accept="image/*">
                            <small>Upload to Supabase Storage</small>
                        </div>
                        <div id="imagePreview"></div>
                    </div>
                </div>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" id="saveProductBtn">💾 Save Product</button>
                    <button type="button" id="cancelEditBtn" style="background:#ccc;">Cancel</button>
                </div>
            </form>
        </div>

        <div class="product-list">
            <h3>📋 All Products</h3>
            <div id="productsList"><div class="loading">Loading products...</div></div>
        </div>
    </div>
</div>

<script>
    // ========== CONFIGURATION ==========
    const ADMIN_PASSWORD = "Bhushan@10";
    const SUPABASE_URL = 'https://ekxyvuvmuhzhgzslefys.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVreHl2dXZtdWh6aGd6c2xlZnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDY5ODksImV4cCI6MjA4OTQ4Mjk4OX0.xLUbGWONyUfPESMAyScxTNnnel4nQznOY23gBBw1zNI';
    const STORAGE_BUCKET = 'products'; // create this bucket in Supabase Storage

    // Global variables
    let products = [];

    // ========== LOGIN ==========
    function checkPassword() {
        const pw = document.getElementById('passwordInput').value;
        if (pw === ADMIN_PASSWORD) {
            document.getElementById('loginDiv').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('loginError').textContent = '';
            loadOrders();
            loadProducts();
        } else {
            document.getElementById('loginError').textContent = 'Incorrect password';
        }
    }

    function logout() {
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('loginDiv').style.display = 'block';
        document.getElementById('passwordInput').value = '';
    }

    // ========== TAB SWITCHING ==========
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const tabName = tab.dataset.tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('ordersSection').style.display = tabName === 'orders' ? 'block' : 'none';
            document.getElementById('productsSection').style.display = tabName === 'products' ? 'block' : 'none';
            if (tabName === 'orders') loadOrders();
            if (tabName === 'products') loadProducts();
        });
    });

    // ========== ORDERS ==========
    async function loadOrders() {
        const container = document.getElementById('ordersTable');
        container.innerHTML = '<div class="loading">Loading orders...</div>';
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
                headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
            });
            if (!res.ok) throw new Error();
            const orders = await res.json();
            if (orders.length === 0) {
                container.innerHTML = '<div class="no-orders">✨ No orders yet.</div>';
                return;
            }
            let html = `<table><thead><tr>
                <th>Order ID</th><th>Date</th><th>Customer</th><th>Phone</th><th>Address</th>
                <th>Items</th><th>Total</th><th>Payment</th><th>Status</th>
            </tr></thead><tbody>`;
            orders.forEach(o => {
                const date = new Date(o.created_at).toLocaleString();
                let itemsHtml = '';
                if (o.items) o.items.forEach(i => itemsHtml += `<span>${i.icon||'🍄'} ${i.name} ×${i.qty}</span> `);
                const statusClass = o.status === 'pending' ? 'pending' : '';
                html += `<tr>
                    <td>${o.order_id || '–'}</td>
                    <td>${date}</td>
                    <td>${o.customer_name || ''}</td>
                    <td>${o.phone || ''}</td>
                    <td>${o.address || ''}, ${o.city || ''} ${o.pin || ''}</td>
                    <td class="items-cell">${itemsHtml}</td>
                    <td>₹${o.total || 0}</td>
                    <td>${o.payment_method || ''}</td>
                    <td><span class="status-badge ${statusClass}">${o.status || 'pending'}</span></td>
                </tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = '<div class="error">Failed to load orders.</div>';
        }
    }

    // ========== PRODUCT CRUD ==========
    async function loadProducts() {
        const container = document.getElementById('productsList');
        container.innerHTML = '<div class="loading">Loading products...</div>';
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/products?order=id`, {
                headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
            });
            if (!res.ok) throw new Error();
            products = await res.json();
            if (products.length === 0) {
                container.innerHTML = '<div class="no-orders">No products yet. Add your first product above!</div>';
                return;
            }
            let html = '';
            products.forEach(p => {
                html += `
                    <div class="product-item">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <img src="${p.image_url || ''}" class="img-preview" onerror="this.src='https://placehold.co/80x80?text=🍄'">
                            <div>
                                <strong>${p.name}</strong> – ₹${p.price} / ${p.unit}<br>
                                <small>${p.category || 'No category'} ${p.featured ? '⭐ Featured' : ''}</small>
                            </div>
                        </div>
                        <div class="product-actions">
                            <button onclick="editProduct(${p.id})">✏️ Edit</button>
                            <button class="delete" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = '<div class="error">Failed to load products.</div>';
        }
    }

    // Upload image to Supabase Storage
    async function uploadImage(file) {
        const fileName = `${Date.now()}_${file.name}`;
        const { data, error } = await supabase.storage.from(STORAGE_BUCKET).upload(fileName, file);
        if (error) throw error;
        const { data: publicUrlData } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
        return publicUrlData.publicUrl;
    }

    // Save product (create or update)
    async function saveProduct(e) {
        e.preventDefault();
        const id = document.getElementById('productId').value;
        const name = document.getElementById('prodName').value.trim();
        const price = parseFloat(document.getElementById('prodPrice').value);
        const unit = document.getElementById('prodUnit').value;
        const tag = document.getElementById('prodTag').value;
        const category = document.getElementById('prodCategory').value;
        const featured = document.getElementById('prodFeatured').checked;
        const description = document.getElementById('prodDesc').value;
        let imageUrl = document.getElementById('prodImageUrl').value.trim();

        // Handle file upload if any
        const fileInput = document.getElementById('prodImageFile');
        if (fileInput.files.length > 0) {
            try {
                const uploadedUrl = await uploadImage(fileInput.files[0]);
                imageUrl = uploadedUrl;
            } catch (err) {
                alert('Image upload failed: ' + err.message);
                return;
            }
        }

        const productData = { name, price, unit, tag, category, featured, description, image_url: imageUrl };

        try {
            let url, method;
            if (id) {
                // Update
                url = `${SUPABASE_URL}/rest/v1/products?id=eq.${id}`;
                method = 'PATCH';
            } else {
                // Insert
                url = `${SUPABASE_URL}/rest/v1/products`;
                method = 'POST';
            }
            const res = await fetch(url, {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify(productData)
            });
            if (!res.ok) throw new Error(await res.text());
            alert(id ? 'Product updated!' : 'Product added!');
            resetForm();
            loadProducts();
        } catch (err) {
            alert('Error saving product: ' + err.message);
        }
    }

    function editProduct(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;
        document.getElementById('productId').value = product.id;
        document.getElementById('prodName').value = product.name;
        document.getElementById('prodPrice').value = product.price;
        document.getElementById('prodUnit').value = product.unit || '';
        document.getElementById('prodTag').value = product.tag || '';
        document.getElementById('prodCategory').value = product.category || '';
        document.getElementById('prodFeatured').checked = product.featured || false;
        document.getElementById('prodDesc').value = product.description || '';
        document.getElementById('prodImageUrl').value = product.image_url || '';
        // Scroll to form
        document.querySelector('.product-form').scrollIntoView({ behavior: 'smooth' });
    }

    async function deleteProduct(id) {
        if (!confirm('Delete this product permanently?')) return;
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
                method: 'DELETE',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            if (!res.ok) throw new Error();
            alert('Product deleted');
            loadProducts();
            resetForm();
        } catch (err) {
            alert('Delete failed: ' + err.message);
        }
    }

    function resetForm() {
        document.getElementById('productId').value = '';
        document.getElementById('productForm').reset();
        document.getElementById('prodImageFile').value = '';
        document.getElementById('imagePreview').innerHTML = '';
    }

    // Cancel edit
    document.getElementById('cancelEditBtn').addEventListener('click', resetForm);
    document.getElementById('refreshBtn').addEventListener('click', () => {
        loadOrders();
        loadProducts();
    });

    // Initialize Supabase client (for storage)
    const supabase = window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY) || 
        (() => { console.warn('Supabase client not loaded, but we only need it for storage; uploads will fail.'); return null; })();

    // Attach form submit
    document.getElementById('productForm').addEventListener('submit', saveProduct);

    // Optional: load initial data after login
    function init() {
        loadOrders();
        loadProducts();
    }
</script>

<!-- Load Supabase JS for Storage -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Create supabase client
    window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>
</body>
</html>
